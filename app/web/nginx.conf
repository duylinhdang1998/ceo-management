server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy for the outer app shell (ADR-002 defense-in-depth).
    # Report HTML is served in a sandboxed iframe by the API — not by nginx.
    # 'unsafe-inline' on style-src is required by Vite-built CSS-in-JS chunks
    # and Google Fonts <link> injection. Remove if you adopt a nonce strategy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self';" always;

    # Proxy /api/* requests to the NestJS API service.
    # NOTE: no trailing slash on proxy_pass → the full "/api/..." path is
    # forwarded unchanged (NestJS controllers are mounted under "api/...").
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # IMPORTANT: do NOT inherit the SPA's strict server-level CSP here.
        # The API sets its OWN per-endpoint CSP — notably GET /api/reports/:id/content
        # returns a relaxed CSP (script-src 'unsafe-inline' ...) so interactive HTML
        # reports can run their inline scripts/event handlers inside the iframe.
        # nginx only inherits server-level add_header directives when a location has
        # NONE of its own, so re-declaring add_header below drops the inherited
        # "script-src 'self'" CSP and lets the upstream API CSP pass through unchanged.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
