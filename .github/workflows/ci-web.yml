name: CI · Web

# Only runs when web code (or this workflow) changes — api pushes won't trigger it.
on:
  push:
    branches: [main, develop]
    paths:
      - "app/web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/web/**"
      - ".github/workflows/ci-web.yml"

jobs:
  # ── Web: lint · build · test ────────────────────────────────
  web:
    name: Web (React + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/web

    env:
      VITE_API_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build (tsc + vite)
        run: npm run build

      - name: Run tests
        run: npm test

  # ── Build & push Web image to GHCR ──────────────────────────
  docker:
    name: Build & Push Web image
    runs-on: ubuntu-latest
    needs: [web]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/ceo-management-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./app/web
          file: ./app/web/Dockerfile
          # Empty base URL → SPA uses relative "/api/..." paths; web-nginx proxies
          # to the api service. VITE_* is baked at build time, so it is set HERE
          # (in CI), not on the VPS.
          build-args: |
            VITE_API_BASE_URL=
          # Push only on main; develop just verifies the build.
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy: SSH to VPS and PULL the new web image (no source, no build) ──
  deploy:
    name: Deploy Web to VPS
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-vps          # never run api + web deploy at the same time
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ship the deploy script + prod compose to the VPS so it never has to be
      # maintained there by hand. Only .env stays on the VPS (it holds secrets).
      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy.sh,docker-compose.prod.yml"
          target: ${{ secrets.VPS_PROJECT_DIR }}

      - name: Pull image & restart on VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_PROJECT_DIR }}
            chmod +x deploy.sh
            ./deploy.sh web
