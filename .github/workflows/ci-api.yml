name: CI · API

# Only runs when API code (or this workflow) changes — web pushes won't trigger it.
on:
  push:
    branches: [main, develop]
    paths:
      - "app/api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/api/**"
      - ".github/workflows/ci-api.yml"

jobs:
  # ── API: lint · typecheck · test (unit + integration) · build ──
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ceo_portal_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d ceo_portal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: app/api

    env:
      DATABASE_URL: postgres://app:app@localhost:5432/ceo_portal_test
      NODE_ENV: test
      JWT_SECRET: ci_test_secret_change_me
      JWT_EXPIRES_IN: 1h
      SEED_ADMIN_EMAIL: ceo@test.com
      SEED_ADMIN_PASSWORD: TestPass123!
      PORT: 3000
      # S3 / AI / SMTP are mocked in integration tests — provide stubs so
      # AppModule can boot without throwing on missing env vars.
      S3_ENDPOINT: https://s3.example.com
      S3_REGION: hcm
      S3_ACCESS_KEY: ci-key
      S3_SECRET_KEY: ci-secret
      S3_BUCKET: ci-bucket
      AI_BASE_URL: https://api.example.com/v1
      AI_API_KEY: ci-ai-key
      AI_MODEL: gemini-2.5-flash
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 465
      SMTP_USER: ci@example.com
      SMTP_PASS: ci-smtp-pass
      SMTP_FROM: "CI <ci@example.com>"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: TypeScript build
        run: npm run build

      - name: Run migrations
        run: npx node-pg-migrate up

      - name: Run full test suite (unit + integration, runInBand)
        run: npm test

  # ── Build & push API image to GHCR ──────────────────────────
  docker:
    name: Build & Push API image
    runs-on: ubuntu-latest
    needs: [api]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/ceo-management-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./app/api
          file: ./app/api/Dockerfile
          # Push only on main; develop just verifies the build.
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy: SSH to VPS and PULL the new api image (no source, no build) ──
  deploy:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read           # GITHUB_TOKEN can then pull the private GHCR image
    concurrency:
      group: deploy-vps          # never run api + web deploy at the same time
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ship the deploy script + prod compose to the VPS so it never has to be
      # maintained there by hand. Only .env stays on the VPS (it holds secrets).
      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy.sh,docker-compose.prod.yml"
          target: ${{ secrets.VPS_PROJECT_DIR }}

      - name: Pull image & restart on VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_PROJECT_DIR }}
            # Authenticate to GHCR with the workflow's short-lived token so the
            # VPS can pull the private image (no PAT, no public package needed).
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            chmod +x deploy.sh
            ./deploy.sh api
