name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── API: lint · typecheck · test (unit + integration) · build ──
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ceo_portal_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d ceo_portal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: app/api

    env:
      DATABASE_URL: postgres://app:app@localhost:5432/ceo_portal_test
      NODE_ENV: test
      JWT_SECRET: ci_test_secret_change_me
      JWT_EXPIRES_IN: 1h
      SEED_ADMIN_EMAIL: ceo@test.com
      SEED_ADMIN_PASSWORD: TestPass123!
      PORT: 3000
      # S3 / AI / SMTP are mocked in integration tests — provide stubs so
      # AppModule can boot without throwing on missing env vars.
      S3_ENDPOINT: https://s3.example.com
      S3_REGION: hcm
      S3_ACCESS_KEY: ci-key
      S3_SECRET_KEY: ci-secret
      S3_BUCKET: ci-bucket
      AI_BASE_URL: https://api.example.com/v1
      AI_API_KEY: ci-ai-key
      AI_MODEL: gemini-2.5-flash
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 465
      SMTP_USER: ci@example.com
      SMTP_PASS: ci-smtp-pass
      SMTP_FROM: "CI <ci@example.com>"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: TypeScript build
        run: npm run build

      - name: Run migrations
        run: npx node-pg-migrate up

      - name: Run full test suite (unit + integration, runInBand)
        run: npm test

  # ── Web: lint · build · test ────────────────────────────────
  web:
    name: Web (React + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/web

    env:
      VITE_API_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build (tsc + vite)
        run: npm run build

      - name: Run tests
        run: npm test

  # ── Docker: build both images ───────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api, web]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./app/api
          file: ./app/api/Dockerfile
          push: false
          tags: ceo-management-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./app/web
          file: ./app/web/Dockerfile
          push: false
          tags: ceo-management-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
